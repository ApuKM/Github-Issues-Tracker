<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Home</title>
    <!-- Daisy UI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm px-10">
        <div class="flex items-center gap-2 flex-1">
          <img src="./assets/github-logo.png" class="max-w-8" alt="" />
          <h2 class="text-[#1F2937] text-2xl font-semibold">
            Github Issues Tracker
          </h2>
        </div>
        <div class="flex gap-2">
          <div class="relative">
            <input
              type="text"
              placeholder="Search issues"
              class="input input-bordered w-24 md:w-auto pl-10"
            />
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
            ></i>
          </div>

          <button class="btn btn-primary">
            <span><i class="fa-solid fa-plus"></i></span>
            New Issue
          </button>
        </div>
      </div>
    </header>
    <main class="bg-[#F8FAFC]">
      <div class="py-14 space-y-4">
        <div class="w-[80%] mx-auto bg-[#FFFFFF] p-5">
          <div class="flex items-center gap-3">
            <button class="btn btn-primary w-30">All</button>
            <button class="btn w-30">Open</button>
            <button class="btn w-30">Close</button>
          </div>
        </div>
        <div class="w-[80%] mx-auto">
          <div class="bg-[#FFFFFF] p-5 flex justify-between items-center">
            <div class="flex gap-3 items-center">
              <div class="bg-gray-300 rounded-full p-1">
                <img src="./assets/Aperture.png" alt="" />
              </div>
              <div>
                <h2 class="text-[#1F2937] text-xl font-semibold">
                  <span>10</span> Issues
                </h2>
                <p class="text-[#64748B]">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex items-center gap-4">
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                <p>Open</p>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-600 rounded-full"></div>
                <p>Closed</p>
              </div>
            </div>
          </div>
          <div class="bg-[#FBFBFB] p-5 grid grid-cols-4 gap-2">
            <div class="card card-border border-gray-200 bg-white w-fit">
              <div class="card-body p-4">
                <div class="flex justify-between items-center">
                  <div>
                    <img src="./assets/Open-Status.png" alt="" />
                    <img src="./assets/Closed- Status .png" alt="" />
                  </div>
                  <h4 class="bg-red-100 px-4 rounded-lg text-red-500">High</h4>
                </div>
                <h2 class="card-title text-[#1F2937] text-sm font-semibold">Card Title</h2>
                <p class="text-[#64748B] text-xs line-clamp-2">
                  A card component has a figure, a body part, and inside body
                  there are title and actions parts
                </p>
                <div class="flex items-center gap-2 mt-1">
                  <h4 class="bg-red-100 px-4 rounded-lg text-red-500">Bug</h4>
                  <h4 class="bg-yellow-100 px-4 rounded-lg text-yellow-500">
                    Help wanted
                  </h4>
                </div>
              </div>
              <hr class="text-gray-200" />
              <div class="p-3">
                <p class="text-[#64748B] text-xs">John doe</p>
                <p class="text-[#64748B] text-xs">1/15/2024</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
