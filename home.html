<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Home</title>
    <!-- Daisy UI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div
        class="navbar bg-base-100 shadow-sm px-4 md:px-10 flex flex-col md:flex-row items-center md:justify-between gap-4"
      >
        <div class="flex items-center gap-2 w-full md:w-auto">
          <img
            src="./assets/github-logo.png"
            class="w-8 h-8"
            alt="GitHub Logo"
          />
          <h2 class="text-[#1F2937] text-xl md:text-2xl font-semibold truncate">
            Github Issues Tracker
          </h2>
        </div>
        <div class="flex w-full md:w-auto justify-start md:justify-end gap-2">
          <div class="relative flex-1 md:flex-none md:w-64">
            <input
              id="search-input"
              type="text"
              placeholder="Search issues"
              class="input input-bordered w-full pl-10 text-sm"
            />
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"
            ></i>
          </div>

          <button
            id="btn-search"
            class="btn btn-primary flex items-center px-3 md:px-4 text-sm md:text-base"
          >
            <span class=""><i class="fa-brands fa-sistrix"></i></span>
            Search
          </button>
        </div>
      </div>
    </header>

    <main class="bg-[#F8FAFC]">
      <div class="py-14 space-y-4">
        <div class="max-w-6xl mx-auto w-[95%] md:w-[90%] bg-white p-5">
          <div class="flex flex-wrap gap-3">
            <button
              onclick="selectCategory(id)"
              id="btn-all"
              class="btn btn-primary toggle-btn w-full sm:w-auto"
            >
              All
            </button>
            <button
              onclick="selectCategory(id)"
              id="btn-open"
              class="btn toggle-btn w-full sm:w-auto"
            >
              Open
            </button>
            <button
              onclick="selectCategory(id)"
              id="btn-close"
              class="btn toggle-btn w-full sm:w-auto"
            >
              Close
            </button>
          </div>
        </div>

        <div class="max-w-6xl mx-auto w-[95%] md:w-[90%]">
          <div
            class="bg-white p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4"
          >
            <div class="flex gap-3 items-start md:items-center">
              <div class="bg-gray-300 rounded-full p-1">
                <img src="./assets/Aperture.png" alt="" class="w-6 h-6" />
              </div>
              <div>
                <h2 class="text-[#1F2937] text-xl font-semibold">
                  <span id="total-issues">0</span>
                  <span id="issues-word">Issues</span>
                </h2>
                <p class="text-[#64748B]">
                  Track and manage your project issues
                </p>
              </div>
            </div>

            <div class="flex items-center gap-4">
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-600 rounded-full"></div>
                <p class="text-[#1F2937] font-medium">Open</p>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                <p class="text-[#1F2937] font-medium">Closed</p>
              </div>
            </div>
          </div>

          <div id="loading-spinner" class="hidden">
            <div class="h-[60vh] flex justify-center items-center">
              <span class="loading loading-dots loading-xl"></span>
            </div>
          </div>

          <div
            id="card-container"
            class="bg-[#FBFBFB] p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 mt-4"
          ></div>
        </div>
      </div>
    </main>
    <!-- modal from DaisyUi -->
    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="modal-card"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary outline-0">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="./scripts/home.js"></script>
  </body>
</html>
