<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Home</title>
    <!-- Daisy UI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm px-10">
        <div class="flex items-center gap-2 flex-1">
          <img src="./assets/github-logo.png" class="max-w-8" alt="" />
          <h2 class="text-[#1F2937] text-2xl font-semibold">
            Github Issues Tracker
          </h2>
        </div>
        <div class="flex gap-2">
          <div class="relative">
            <input
              type="text"
              placeholder="Search issues"
              class="input input-bordered w-24 md:w-auto pl-10"
            />
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
            ></i>
          </div>

          <button class="btn btn-primary flex items-center">
            <span><i class="fa-brands fa-sistrix"></i></span>
            Search
          </button>
        </div>
      </div>
    </header>
    <main class="bg-[#F8FAFC] ">
      <div class="py-14 space-y-4">
        <div class="w-[90%] mx-auto bg-[#FFFFFF] p-5">
          <div class="flex items-center gap-3">
            <button onclick="selectCategory(id)" id="btn-all" class="btn btn-primary w-30 toggle-btn">All</button>
            <button onclick="selectCategory(id)" id="btn-open" class="btn w-30 toggle-btn">Open</button>
            <button onclick="selectCategory(id)" id="btn-close" class="btn w-30 toggle-btn">Close</button>
          </div>
        </div>
        <div class="w-[90%] mx-auto">
          <div class="bg-[#FFFFFF] p-5 flex justify-between items-center">
            <div class="flex gap-3 items-center">
              <div class="bg-gray-300 rounded-full p-1">
                <img src="./assets/Aperture.png" alt="" />
              </div>
              <div>
                <h2 class="text-[#1F2937] text-xl font-semibold">
                  <span id="total-issues">10</span> Issues
                </h2>
                <p class="text-[#64748B]">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex items-center gap-4">
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-600 rounded-full"></div>
                <p class="text-[#1F2937] font-medium">Open</p>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                <p class="text-[#1F2937] font-medium">Closed</p>
              </div>
            </div>
          </div>
          <div id="card-container" class="bg-[#FBFBFB] p-5 grid grid-cols-4 gap-3">

          </div>
        </div>
      </div>
    </main>

    <script src="./scripts/home.js"></script>
  </body>
</html>
